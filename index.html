<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FORGE PPL</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Space Mono',monospace;background:#080c0a;color:#c8d4c0;min-height:100vh}
#app{display:flex;flex-direction:column;min-height:100vh}
.header{background:#0a0f0a;border-bottom:1px solid #162016;padding:14px 18px;position:sticky;top:0;z-index:10}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.logo{font-family:'Bebas Neue';font-size:26px;letter-spacing:4px;color:#fff;line-height:1}
.logo span{color:var(--day-color)}
.date-label{font-size:10px;color:#3a5a3a;letter-spacing:2px;margin-top:2px}
.view-btns{display:flex;gap:4px}
.view-btn{background:none;border:none;font-family:'Bebas Neue';font-size:13px;letter-spacing:2px;padding:6px 14px;cursor:pointer;border-radius:2px;color:#3a5a3a}
.view-btn.active{background:color-mix(in srgb,var(--day-color) 15%,transparent);color:var(--day-color)}
.day-tabs{display:flex;overflow-x:auto}
.day-tab{background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:'Bebas Neue';font-size:15px;letter-spacing:2px;padding:8px 28px;color:#3a4a3a;white-space:nowrap}
.day-tab.active{color:var(--day-color);border-bottom-color:var(--day-color)}
.day-header{padding:16px 18px 0;display:flex;align-items:flex-end;justify-content:space-between}
.day-title{font-family:'Bebas Neue';font-size:32px;letter-spacing:3px;line-height:1;color:var(--day-color)}
.day-focus{font-size:11px;color:#4a6a4a;letter-spacing:1px;margin-top:3px}
.progress-pct{font-family:'Bebas Neue';font-size:28px;letter-spacing:1px;text-align:right;color:#fff}
.progress-pct.complete{color:var(--day-color)}
.progress-count{font-size:10px;color:#3a5a3a;letter-spacing:1px;text-align:right}
.progress-track{margin:10px 18px 0;height:3px;background:#162016;border-radius:2px}
.progress-fill{height:100%;border-radius:2px;transition:width 0.3s ease;background:var(--day-color)}
.cards{padding:16px 18px 80px;display:flex;flex-direction:column;gap:12px}
.ex-card{background:#0c110c;border:1px solid #162016;border-radius:4px;padding:16px;transition:border 0.2s,background 0.2s}
.ex-card.done{border-color:color-mix(in srgb,var(--day-color) 25%,transparent);background:color-mix(in srgb,var(--day-color) 4%,#0c110c)}
.ex-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.ex-left{flex:1}
.ex-name-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ex-name{font-family:'Bebas Neue';font-size:17px;letter-spacing:1.5px;color:#c8d4c0}
.ex-name.done{color:var(--day-color)}
.tag-bb{font-size:9px;letter-spacing:1.5px;border:1px solid #ffba1a55;color:#ffba1a;padding:1px 6px;border-radius:2px}
.tag-db{font-size:9px;letter-spacing:1.5px;border:1px solid #aa88ff55;color:#aa88ff;padding:1px 6px;border-radius:2px}
.tag-done{font-size:9px;letter-spacing:2px;border:1px solid color-mix(in srgb,var(--day-color) 40%,transparent);color:var(--day-color);padding:1px 6px;border-radius:2px}
.ex-muscles{font-size:10px;color:#3a5a3a;margin-top:2px;letter-spacing:0.5px}
.ex-sets-label{font-family:'Bebas Neue';font-size:20px;color:#c8d4c0;letter-spacing:1px;text-align:right}
.ex-sets-label span{font-size:12px;color:#4a6a4a}
.ex-controls{display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.ctrl-label{font-size:9px;color:#3a5a3a;letter-spacing:2px;margin-bottom:4px;text-transform:uppercase}
.weight-input{background:#0d140d;border:1px solid #1a2a1a;color:var(--day-color);font-family:'Bebas Neue';font-size:18px;padding:4px 8px;border-radius:3px;width:90px;outline:none;text-align:center}
.weight-input::placeholder{color:#2a3a2a}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.set-dots{display:flex;gap:6px}
.set-dot{width:28px;height:28px;border-radius:50%;border:2px solid #2a3a2a;background:none;cursor:pointer;font-size:11px;font-family:'Space Mono';font-weight:700;color:#2a3a2a;display:flex;align-items:center;justify-content:center}
.set-dot.done{background:var(--day-color);border-color:var(--day-color);color:#080c0a}
.note-input{background:#0d140d;border:1px solid #1a2a1a;color:#8aaa8a;font-family:'Space Mono';font-size:11px;padding:8px 10px;border-radius:3px;width:100%;outline:none;resize:none;line-height:1.5}
.walk-card{background:#0c110c;border:1px solid #162016;border-radius:4px;padding:18px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.walk-card.done{border-color:#ffd70066;background:rgba(255,215,0,0.05)}
.walk-left{display:flex;align-items:center;gap:14px}
.walk-icon{font-size:24px}
.walk-title{font-family:'Bebas Neue';font-size:17px;letter-spacing:1.5px;color:#c8d4c0}
.walk-title.done{color:#ffd700}
.walk-sub{font-size:10px;color:#3a5a3a;margin-top:3px;letter-spacing:1px}
.walk-check{width:32px;height:32px;border-radius:50%;border:2px solid #2a3a2a;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#2a3a2a}
.walk-check.done{background:#ffd700;border-color:#ffd700;color:#080c0a}
.log-title{font-family:'Bebas Neue';font-size:18px;letter-spacing:3px;color:#4a6a4a;margin-bottom:14px}
.log-day{margin-bottom:16px;background:#0c110c;border:1px solid #162016;border-radius:4px;overflow:hidden}
.log-day-header{padding:10px 14px;background:#0f150f;border-bottom:1px solid #162016;display:flex;justify-content:space-between;align-items:center}
.log-day-name{font-family:'Bebas Neue';font-size:16px;letter-spacing:2px}
.log-no-data{font-size:10px;color:#2a3a2a;letter-spacing:1px}
.log-row{padding:10px 14px;border-bottom:1px solid #111a11;display:flex;gap:12px;align-items:flex-start}
.log-ex-name{font-family:'Bebas Neue';font-size:14px;color:#c8d4c0;letter-spacing:1px}
.log-ex-notes{font-size:11px;color:#4a6a4a;margin-top:3px;line-height:1.5}
.log-weight{font-family:'Bebas Neue';font-size:22px;letter-spacing:1px;flex-shrink:0}
.log-weight span{font-size:11px;color:#3a5a3a}
</style>
</head>
<body>
<div id="app"></div>
<script>
const WORKOUT_PLAN=[
  {day:1,type:"PULL",focus:"Back & Biceps",color:"#00c8ff",exercises:[
    {name:"Deadlift",sets:2,reps:"5-8",muscles:"Hamstrings · Glutes · Entire Back",tag:"BB"},
    {name:"Bent Over Row",sets:2,reps:"5-8",muscles:"Lats · Rhomboids · Biceps",tag:"BB"},
    {name:"Lat Pulldown",sets:2,reps:"5-8",muscles:"Lats · Teres Major · Biceps",tag:""},
    {name:"Face Pull",sets:2,reps:"5-8",muscles:"Rear Delts · Rotator Cuff · Traps",tag:""},
    {name:"Hammer Curl",sets:2,reps:"5-8",muscles:"Brachialis · Brachioradialis",tag:"DB"},
    {name:"Bayesian Curl",sets:2,reps:"5-8",muscles:"Biceps Long Head · Full Stretch",tag:""}
  ]},
  {day:2,type:"PUSH",focus:"Chest, Shoulders & Triceps",color:"#ff4d1c",exercises:[
    {name:"Bench Press",sets:2,reps:"5-8",muscles:"Pecs · Anterior Delt · Triceps",tag:"BB"},
    {name:"Overhead Press",sets:2,reps:"5-8",muscles:"Anterior Delt · Upper Pecs · Triceps",tag:"BB"},
    {name:"Incline Bench Press",sets:2,reps:"5-8",muscles:"Upper Pecs · Front Delt",tag:"DB"},
    {name:"Triceps",sets:2,reps:"5-8",muscles:"All 3 Tricep Heads · Lockout",tag:""},
    {name:"Lateral Raise",sets:2,reps:"5-8",muscles:"Medial Delt · Shoulder Width",tag:""}
  ]},
  {day:3,type:"LEGS",focus:"Quads, Hamstrings & Glutes",color:"#39d98a",exercises:[
    {name:"Squat",sets:2,reps:"5-8",muscles:"Quads · Glutes · Core · Erectors",tag:"BB"},
    {name:"Romanian Deadlift",sets:2,reps:"5-8",muscles:"Hamstrings · Glutes · Lower Back",tag:"BB"},
    {name:"Leg Press",sets:2,reps:"5-8",muscles:"Quads · Glutes · Adductors",tag:""},
    {name:"Leg Curl",sets:2,reps:"5-8",muscles:"Hamstring Isolation · Knee Flexion",tag:""},
    {name:"Calf Raise",sets:2,reps:"5-8",muscles:"Gastrocnemius · Soleus",tag:""}
  ]}
];
const SK="forge_ppl";
let state={activeDay:0,view:"workout",notes:{},sets:{},walks:{}};
function load(k){try{const r=localStorage.getItem(k);return r?JSON.parse(r):{}}catch{return{}}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
state.notes=load(SK+"_n");
state.walks=load(SK+"_w");
function nk(d,e){return"d"+d+"e"+e}
function sd(d,e,s){return!!state.sets[d+"_"+e+"_"+s]}
function exDone(d,i,sets){return Array.from({length:sets},(_,s)=>sd(d,i,s)).every(Boolean)}
function prog(di){const d=WORKOUT_PLAN[di];const ex=d.exercises.filter((e,i)=>exDone(di,i,e.sets)).length;const w=state.walks[di]?1:0;const t=d.exercises.length+1;return{done:ex+w,total:t,pct:Math.round(((ex+w)/t)*100)}}
function setColor(c){document.documentElement.style.setProperty("--day-color",c)}
function render(){
  const day=WORKOUT_PLAN[state.activeDay];
  setColor(day.color);
  const p=prog(state.activeDay);
  const today=new Date().toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
  document.getElementById("app").innerHTML=`
    <div class="header">
      <div class="header-top">
        <div><div class="logo">FORGE <span>PPL</span></div><div class="date-label">${today}</div></div>
        <div class="view-btns">
          <button class="view-btn ${state.view==="workout"?"active":""}" onclick="sv('workout')">WORKOUT</button>
          <button class="view-btn ${state.view==="log"?"active":""}" onclick="sv('log')">LOG</button>
        </div>
      </div>
      <div class="day-tabs">
        ${WORKOUT_PLAN.map((d,i)=>`<button class="day-tab ${state.activeDay===i?"active":""}" style="${state.activeDay===i?`color:${d.color};border-bottom-color:${d.color}`:""}" onclick="sd2(${i})">D${d.day} ${d.type}</button>`).join("")}
      </div>
    </div>
    <div class="day-header">
      <div><div class="day-title">DAY ${day.day} — ${day.type}</div><div class="day-focus">${day.focus}</div></div>
      <div><div class="progress-pct ${p.pct===100?"complete":""}">${p.pct}%</div><div class="progress-count">${p.done}/${p.total} DONE</div></div>
    </div>
    <div class="progress-track"><div class="progress-fill" style="width:${p.pct}%;${p.pct>0?`box-shadow:0 0 8px ${day.color}88`:""}"></div></div>
    <div class="cards">${state.view==="workout"?rw():rl()}</div>
  `;
}
function rw(){
  const day=WORKOUT_PLAN[state.activeDay];
  const wd=!!state.walks[state.activeDay];
  const exs=day.exercises.map((ex,ei)=>{
    const done=exDone(state.activeDay,ei,ex.sets);
    const n=state.notes[nk(state.activeDay,ei)]||{};
    const tag=ex.tag==="BB"?`<span class="tag-bb">BARBELL</span>`:ex.tag==="DB"?`<span class="tag-db">DUMBBELL</span>`:"";
    const dots=Array.from({length:ex.sets},(_,s)=>`<button class="set-dot ${sd(state.activeDay,ei,s)?"done":""}" onclick="ts(${ei},${s})">${s+1}</button>`).join("");
    return`<div class="ex-card ${done?"done":""}">
      <div class="ex-top">
        <div class="ex-left">
          <div class="ex-name-row"><span class="ex-name ${done?"done":""}">${ex.name}</span>${tag}${done?`<span class="tag-done">DONE</span>`:""}</div>
          <div class="ex-muscles">${ex.muscles}</div>
        </div>
        <div class="ex-sets-label">${ex.sets}<span>x</span>${ex.reps}</div>
      </div>
      <div class="ex-controls">
        <div><div class="ctrl-label">WEIGHT (LBS)</div><input type="number" class="weight-input" placeholder="000" value="${n.weight||""}" oninput="un(${ei},'weight',this.value)"/></div>
        <div><div class="ctrl-label">SETS COMPLETE</div><div class="set-dots">${dots}</div></div>
      </div>
      <textarea class="note-input" rows="2" placeholder="Notes — form cues, feel, next session target..." oninput="un(${ei},'notes',this.value)">${n.notes||""}</textarea>
    </div>`;
  }).join("");
  const wc=`<div class="walk-card ${wd?"done":""}" onclick="tw()">
    <div class="walk-left"><div class="walk-icon">🚶</div>
    <div><div class="walk-title ${wd?"done":""}">30 MIN INCLINE WALK</div>
    <div class="walk-sub">15% INCLINE · 3.0 SPEED · FAT BURN</div></div></div>
    <div class="walk-check ${wd?"done":""}">${wd?"✓":""}</div>
  </div>`;
  return exs+wc;
}
function rl(){
  return`<div class="log-title">SESSION LOG — ALL DAYS</div>`+WORKOUT_PLAN.map((d,di)=>{
    const wd=!!state.walks[di];
    const rows=d.exercises.map((ex,ei)=>{const k=nk(di,ei);const n=state.notes[k]||{};if(!n.weight&&!n.notes)return"";return`<div class="log-row"><div style="flex:1"><div class="log-ex-name">${ex.name}</div>${n.notes?`<div class="log-ex-notes">${n.notes}</div>`:""}</div>${n.weight?`<div class="log-weight" style="color:${d.color}">${n.weight}<span>lbs</span></div>`:""}</div>`;}).join("");
    const hasData=rows.length>0||wd;
    const wr=wd?`<div class="log-row"><div style="flex:1"><div class="log-ex-name" style="color:#ffd700">🚶 30 MIN WALK</div><div class="log-ex-notes">Completed</div></div></div>`:"";
    return`<div class="log-day"><div class="log-day-header"><div class="log-day-name" style="color:${d.color}">DAY ${d.day} — ${d.type}</div>${!hasData?`<div class="log-no-data">NO DATA YET</div>`:""}</div>${rows}${wr}</div>`;
  }).join("");
}
function sd2(i){state.activeDay=i;render()}
function sv(v){state.view=v;render()}
function tw(){state.walks[state.activeDay]=!state.walks[state.activeDay];save(SK+"_w",state.walks);render()}
function ts(ei,si){const k=state.activeDay+"_"+ei+"_"+si;state.sets[k]=!state.sets[k];render()}
function un(ei,f,v){const k=nk(state.activeDay,ei);if(!state.notes[k])state.notes[k]={};state.notes[k][f]=v;save(SK+"_n",state.notes);const p=prog(state.activeDay);const day=WORKOUT_PLAN[state.activeDay];const pe=document.querySelector(".progress-pct");const ce=document.querySelector(".progress-count");const fe=document.querySelector(".progress-fill");if(pe){pe.textContent=p.pct+"%";pe.className="progress-pct"+(p.pct===100?" complete":"")}if(ce)ce.textContent=p.done+"/"+p.total+" DONE";if(fe){fe.style.width=p.pct+"%";fe.style.boxShadow=p.pct>0?`0 0 8px ${day.color}88`:""}}
render();
</script>
</body>
</html>
